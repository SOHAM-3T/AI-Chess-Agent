<!DOCTYPE html>
<html>

<head>
    <title>Sunfish Chess GUI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #302e2b;
            color: #c5c5c5;
        }

        h1 {
            margin-bottom: 10px;
        }

        #board {
            width: 600px;
            margin: 20px;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #81b64c;
            border: none;
            color: white;
            border-radius: 4px;
        }

        button:hover {
            background-color: #a3d160;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Sunfish Chess</h1>
    <div id="board"></div>
    <div id="status">White to move</div>
    <div class="controls">
        <button id="newGameWhiteBtn">New Game (White)</button>
        <button id="newGameBlackBtn">New Game (Black)</button>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var playerColor = 'white';

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Only allow picking up pieces for the player's color
            // If player is white, pick up white pieces (w...)
            // If player is black, pick up black pieces (b...)
            // AND ensure it's that side's turn

            // Allow simplified logic: just ensure it's the side to move
            // AND the side to move is the player's color.
            var turn = game.turn(); // 'w' or 'b'
            var pieceColor = piece.charAt(0); // 'w' or 'b'

            if (turn !== pieceColor) return false;

            if (playerColor === 'white' && pieceColor === 'b') return false;
            if (playerColor === 'black' && pieceColor === 'w') return false;
        }

        function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();

            // Send move to backend
            $.ajax({
                type: "POST",
                url: "/move",
                contentType: "application/json",
                data: JSON.stringify({ move: move.from + move.to + (move.promotion ? move.promotion : '') }),
                success: function (response) {
                    if (response.engine_move) {
                        game.move({
                            from: response.engine_move.substring(0, 2),
                            to: response.engine_move.substring(2, 4),
                            promotion: response.engine_move.length > 4 ? response.engine_move.substring(4, 5) : undefined
                        });
                        board.position(game.fen());
                        updateStatus();
                    } else if (response.game_over) {
                        alert("Game Over: " + response.result);
                    }
                },
                error: function (err) {
                    console.error("Error:", err);
                    game.undo();
                    board.position(game.fen());
                }
            });
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) {
                    status += ', ' + moveColor + ' is in check';
                }
            }
            $('#status').html(status);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);

        function startNewGame(color) {
            playerColor = color;
            $.ajax({
                type: "POST",
                url: "/newgame",
                contentType: "application/json",
                data: JSON.stringify({ color: color }),
                success: function (response) {
                    game.reset();
                    if (response.engine_move) {
                        game.move({
                            from: response.engine_move.substring(0, 2),
                            to: response.engine_move.substring(2, 4),
                            promotion: response.engine_move.length > 4 ? response.engine_move.substring(4, 5) : undefined
                        });
                    }

                    board.orientation(color);
                    board.position(game.fen());
                    updateStatus();
                }
            });
        }

        $('#newGameWhiteBtn').on('click', function () {
            startNewGame('white');
        });

        $('#newGameBlackBtn').on('click', function () {
            startNewGame('black');
        });

        updateStatus();
    </script>
</body>

</html>
